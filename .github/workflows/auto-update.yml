name: Auto-Update Glizzies Site

on:
  schedule:
    # ── Regular season / playoff Fridays ──
    # Games typically 8-10:30 PM MT. Run 1hr after a 10:30 PM game = 11:30 PM MT = 5:30 AM UTC Sat
    - cron: '30 5 * * 6'   # Saturday 5:30 AM UTC = Friday 11:30 PM MT (post-game)

    # ── Championship game: July 3 at 8 PM MT = 2 AM UTC July 4 → run at 3 AM UTC July 4 ──
    - cron: '0 3 4 7 *'    # July 4, 3:00 AM UTC = July 3, 9:00 PM MT (1hr after 8pm game)

    # ── Fallback: Wednesday 3 AM MT for Thursday game nights ──
    - cron: '0 9 * * 3'    # Wednesday 9:00 AM UTC = 3:00 AM MT

  workflow_dispatch:        # Manual trigger button on GitHub Actions

jobs:
  update-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run auto-update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GAMESHEET_TEAM_ID: f6cc3e10-5c24-4049-b6a9-bf2d57024f4a
        run: python3 scripts/auto-update.py

      - name: Commit and push if anything changed
        run: |
          git config --global user.email "utahglizzies@gmail.com"
          git config --global user.name "Glizzies Bot"
          git add -A
          git diff --quiet HEAD || (git commit -m "🤖 Auto-update: $(date '+%Y-%m-%d') game data + AI content" && git push)
          echo "Done — Cloudflare Pages deploys automatically on push to main"
